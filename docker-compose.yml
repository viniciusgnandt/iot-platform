version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iot_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      CORS_ORIGIN: http://localhost
      MONGO_URI: mongodb+srv://viniciusgnandt_db_user:kk3KyRKh0ppv8j0S@univesp-pi-5.akx42mw.mongodb.net/?appName=univesp-pi-5
      MONGO_ENABLED: "true"
      CACHE_TTL_SENSORS: 300
      CACHE_TTL_CITIES: 600
      CACHE_TTL_RANKING: 600
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 100
      OPENSENSEMAP_BASE_URL: https://api.opensensemap.org
      SENSOR_COMMUNITY_BASE_URL: https://data.sensor.community/airrohr/v1/filter
      OPENWEATHER_BASE_URL: https://api.openweathermap.org/data/2.5
      OPENWEATHER_API_KEY: ""
      MAX_SENSORS_PER_SOURCE: 200
      SENSOR_MAX_AGE_HOURS: 2
    networks:
      - iot_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/sensors"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Web Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: iot_frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - iot_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  iot_network:
    driver: bridge
