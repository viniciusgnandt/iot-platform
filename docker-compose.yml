version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iot_backend
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      CORS_ORIGIN: "https://iot-platform.viniciusgnandt.com.br"
      MONGO_URI: mongodb+srv://viniciusgnandt_db_user:kk3KyRKh0ppv8j0S@univesp-pi-5.akx42mw.mongodb.net/?appName=univesp-pi-5
      MONGO_ENABLED: "true"
      CACHE_TTL_SENSORS: 300
      CACHE_TTL_CITIES: 600
      CACHE_TTL_RANKING: 600
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 100
      SENSOR_COMMUNITY_BASE_URL: https://data.sensor.community/airrohr/v1/filter
      MAX_SENSORS_PER_SOURCE: 200
      SENSOR_MAX_AGE_HOURS: 2
    networks:
      - iot_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/api/health', r => { if(r.statusCode!==200) throw new Error() })"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5

  # Frontend Web Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: iot_frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - iot_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  iot_network:
    driver: bridge
